<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potala Palace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #eceae4;
      color: #7a0805;
    }
    .phone {
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: linear-gradient(to bottom, #e6edf1 0%, #eceae4 48%, #e6e1d7 100%);
    }
    .logo {
      position: absolute;
      top: 20px;
      left: 18px;
      z-index: 5;
      transform: scale(.62);
      transform-origin: top left;
    }
    .ladder {
      width: 90px;
      height: 150px;
      position: relative;
      transform: rotate(-12deg);
    }
    .ladder .rail1,
    .ladder .rail2,
    .ladder .step {
      position: absolute;
      background: #ccb07a;
      border-radius: 4px;
    }
    .ladder .rail1 { width: 9px; height: 128px; left: 24px; bottom: 0; transform: skewX(-14deg); }
    .ladder .rail2 { width: 9px; height: 138px; right: 20px; bottom: 6px; transform: skewX(14deg); }
    .ladder .step.s1 { width: 40px; height: 8px; left: 24px; bottom: 14px; }
    .ladder .step.s2 { width: 34px; height: 8px; left: 27px; bottom: 36px; }
    .ladder .step.s3 { width: 30px; height: 8px; left: 30px; bottom: 58px; }
    .ladder .step.s4 { width: 24px; height: 8px; left: 34px; bottom: 80px; }
    .ladder .step.s5 { width: 18px; height: 8px; left: 38px; bottom: 102px; }
    .ladder .step.s6 { width: 12px; height: 8px; left: 42px; bottom: 124px; }
    .logo-text {
      margin-top: -6px;
      font-size: 16px;
      letter-spacing: 2px;
      color: #7a0805;
    }
    .hero {
      min-height: 100vh;
      padding: 110px 18px 24px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .title {
      position: relative;
      z-index: 4;
      margin-top: 10px;
    }
    .title .big {
      display: block;
      font-size: clamp(64px, 20vw, 110px);
      line-height: .84;
      font-weight: 700;
      letter-spacing: -0.06em;
      text-transform: uppercase;
      color: #7a0805;
      text-shadow: 4px 4px 0 rgba(60,0,0,.12);
    }
    .title .big.two {
      margin-left: 34px;
      margin-top: -6px;
    }
    .tibetan {
      margin-top: 10px;
      margin-left: 6px;
      font-size: 24px;
      color: #7a0805;
      letter-spacing: 1px;
    }
    .art {
      position: relative;
      height: 58vh;
      min-height: 420px;
      margin-top: 10px;
    }
    .mist {
      position: absolute;
      width: 180px;
      height: 120px;
      left: 24px;
      top: 84px;
      background: radial-gradient(circle at 40% 50%, rgba(120,160,215,.55), rgba(120,160,215,.08) 70%);
      filter: blur(10px);
      z-index: 1;
    }
    .palace-top {
      position: absolute;
      width: 150px;
      height: 95px;
      left: 108px;
      top: 72px;
      z-index: 2;
    }
    .red-core {
      position: absolute;
      width: 76px;
      height: 38px;
      left: 38px;
      top: 0;
      background: #7a0805;
    }
    .red-core:before, .red-core:after {
      content: "";
      position: absolute;
      width: 10px;
      height: 8px;
      top: -8px;
      background: #caa866;
    }
    .red-core:before { left: 18px; }
    .red-core:after { right: 18px; }
    .white-base {
      position: absolute;
      background: #f8f6f0;
      box-shadow: inset 0 0 0 1px rgba(122,8,5,.05);
    }
    .b1 { width: 120px; height: 24px; left: 10px; top: 34px; }
    .b2 { width: 98px; height: 20px; left: 26px; top: 56px; }
    .b3 { width: 80px; height: 16px; left: 34px; top: 74px; }
    .stairs {
      position: absolute;
      right: -12px;
      bottom: 0;
      width: 92%;
      height: 260px;
      z-index: 3;
    }
    .wall {
      position: absolute;
      right: 0;
      background: #f8f6f0;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(122,8,5,.05);
    }
    .wall:before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 14px;
      background: #7a0805;
    }
    .w1 { width: 100%; height: 62px; bottom: 0; clip-path: polygon(15% 0,100% 0,100% 100%,0 100%,0 34%); }
    .w2 { width: 84%; height: 58px; bottom: 48px; clip-path: polygon(17% 0,100% 0,100% 100%,0 100%,0 36%); }
    .w3 { width: 69%; height: 54px; bottom: 92px; clip-path: polygon(19% 0,100% 0,100% 100%,0 100%,0 38%); }
    .w4 { width: 54%; height: 50px; bottom: 132px; clip-path: polygon(21% 0,100% 0,100% 100%,0 100%,0 40%); }
    .w5 { width: 40%; height: 46px; bottom: 168px; clip-path: polygon(24% 0,100% 0,100% 100%,0 100%,0 42%); }
    .bottom {
      position: relative;
      z-index: 5;
      padding-bottom: 10px;
    }
    .tag {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b7e69;
      margin-bottom: 10px;
    }
    .desc {
      max-width: 280px;
      font-size: 14px;
      line-height: 1.6;
      color: #6e5f4d;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      padding: 11px 16px;
      border: 1px solid #7a0805;
      color: #7a0805;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255,255,255,.35);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="logo">
      <div class="ladder">
        <div class="rail1"></div>
        <div class="rail2"></div>
        <div class="step s1"></div>
        <div class="step s2"></div>
        <div class="step s3"></div>
        <div class="step s4"></div>
        <div class="step s5"></div>
        <div class="step s6"></div>
      </div>
      <div class="logo-text">POTALA</div>
    </div>

    <section class="hero">
      <div>
        <div class="title">
          <span class="big">POTALA</span>
          <span class="big two">PALACE</span>
          <div class="tibetan">པོ་ཏ་ལ་ཕོ་བྲང</div>
        </div>

        <div class="art">
          <div class="mist"></div>

          <div class="palace-top">
            <div class="red-core"></div>
            <div class="white-base b1"></div>
            <div class="white-base b2"></div>
            <div class="white-base b3"></div>
          </div>

          <div class="stairs">
            <div class="wall w1"></div>
            <div class="wall w2"></div>
            <div class="wall w3"></div>
            <div class="wall w4"></div>
            <div class="wall w5"></div>
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="tag">UNESCO World Heritage</div>
        <div class="desc">A mobile landing page built from ascent, sacred geometry, and the stepped rhythm of Potala Palace.</div>
        <a href="#" class="btn">Enter</a>
      </div>
    </section>
  </div>
</body>
</html>
